apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-multi
  namespace: nolly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: target-multi
  template:
    metadata:
      labels:
        app: target-multi
    spec:
      containers:
        - name: multi
          image: python:3.11-alpine
          command:
            - sh
            - -c
            - |
              python -m http.server 80 &
              python -m http.server 8080 &
              wait
          ports:
            - containerPort: 80
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: target-multi
  namespace: nolly
spec:
  selector:
    app: target-multi
  ports:
    - name: http-80
      port: 80
      targetPort: 80
    - name: http-8080
      port: 8080
      targetPort: 8080
  type: ClusterIP